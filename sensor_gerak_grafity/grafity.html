<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gesture Particles - Audio MP3 Integrated</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #050505;
        font-family: "Segoe UI", Roboto, sans-serif;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #input_video {
        position: absolute;
        transform: scaleX(-1);
        opacity: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      /* --- UI LAYER --- */
      #ui-layer {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        color: white;
        pointer-events: none;
      }

      .status {
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(10px);
        padding: 10px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
      }

      #gesture-icon {
        font-size: 18px;
      }

      /* Instruksi Audio */
      #audio-instruction {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        z-index: 20;
        pointer-events: none;
        text-align: center;
        animation: blink 2s infinite;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      }
      @keyframes blink {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="ui-layer">
      <div class="status" id="status-container">
        <span id="gesture-icon" style="display: none"></span>
        <span id="status-text">Loading...</span>
      </div>
    </div>

    <div id="audio-instruction">KLIK LAYAR SEKALI UNTUK MENGAKTIFKAN SUARA</div>

    <video id="input_video"></video>
    <div id="canvas-container"></div>

    <script type="module">
      import * as THREE from "three";
      import { FontLoader } from "three/addons/loaders/FontLoader.js";
      import { TextGeometry } from "three/addons/geometries/TextGeometry.js";
      import { MeshSurfaceSampler } from "three/addons/math/MeshSurfaceSampler.js";

      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      // --- KONFIGURASI AUDIO (.mp3) ---
      // Sesuai nama file di screenshot kamu:
      const sfx = {
        // Gerakan LOVE (Pinch) -> File: pinch.mp3
        heart: new Audio("pinch.mp3"),

        // Gerakan SATURN (Fist) -> File: saturn.mp3
        saturn: new Audio("saturn.mp3"),

        // Gerakan PEACE/TEXT -> File: peach.mp3 (sesuai gambar)
        text: new Audio("peach.mp3"),

        // Gerakan SCATTERING -> File: Open_Hand.mp3
        cloud: new Audio("Open_Hand.mp3"),
      };

      // Volume 60%
      Object.values(sfx).forEach((sound) => (sound.volume = 0.6));

      // --- KONFIGURASI GLOBAL ---
      const particleCount = 6000;
      const GLOBAL_SCALE = 1.2;

      // --- SETUP THREE.JS ---
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000000, 0.001);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.z = 80;

      const renderer = new THREE.WebGLRenderer({
        antialias: false,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.toneMapping = THREE.ReinhardToneMapping;
      document
        .getElementById("canvas-container")
        .appendChild(renderer.domElement);

      // --- BLOOM EFFECT ---
      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5,
        0.4,
        0.85,
      );
      bloomPass.threshold = 0;
      bloomPass.strength = 2.0;
      bloomPass.radius = 0.5;

      const composer = new EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);

      // --- PARTICLE SYSTEM ---
      const geometry = new THREE.BufferGeometry();
      const currentPositions = new Float32Array(particleCount * 3);
      const targetPositions = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount * 3; i++) {
        currentPositions[i] = (Math.random() - 0.5) * 50 * GLOBAL_SCALE;
        targetPositions[i] = (Math.random() - 0.5) * 50 * GLOBAL_SCALE;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(currentPositions, 3),
      );

      const material = new THREE.PointsMaterial({
        color: 0x00ffff,
        size: 0.3,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.9,
        depthWrite: false,
      });

      const particles = new THREE.Points(geometry, material);
      scene.add(particles);

      let targetGroupPosition = new THREE.Vector3(0, 0, 0);

      // --- SHAPE GENERATORS ---
      const shapes = { sphere: [], cloud: [], saturn: [], heart: [], text: [] };

      function calculateSphere() {
        const tempPos = [];
        for (let i = 0; i < particleCount; i++) {
          const r = 35 * Math.cbrt(Math.random());
          const theta = Math.random() * 2 * Math.PI;
          const phi = Math.acos(2 * Math.random() - 1);
          tempPos.push(
            r * Math.sin(phi) * Math.cos(theta) * GLOBAL_SCALE,
            r * Math.sin(phi) * Math.sin(theta) * GLOBAL_SCALE,
            r * Math.cos(phi) * GLOBAL_SCALE,
          );
        }
        return tempPos;
      }

      function calculateScatteredCloud() {
        const tempPos = [];
        for (let i = 0; i < particleCount; i++) {
          const r = 60 + Math.random() * 120;
          const theta = Math.random() * 2 * Math.PI;
          const phi = Math.acos(2 * Math.random() - 1);
          tempPos.push(
            r * Math.sin(phi) * Math.cos(theta) * GLOBAL_SCALE,
            r * Math.sin(phi) * Math.sin(theta) * GLOBAL_SCALE,
            r * Math.cos(phi) * GLOBAL_SCALE,
          );
        }
        return tempPos;
      }

      function calculateSaturn() {
        const tempPos = [];
        const bodyCount = Math.floor(particleCount * 0.35);
        const ringCount = particleCount - bodyCount;
        for (let i = 0; i < bodyCount; i++) {
          const r = 16 * Math.cbrt(Math.random());
          const theta = Math.random() * 2 * Math.PI;
          const phi = Math.acos(2 * Math.random() - 1);
          let x = r * Math.sin(phi) * Math.cos(theta),
            y = r * Math.sin(phi) * Math.sin(theta),
            z = r * Math.cos(phi);
          const tilt = Math.PI / 6;
          tempPos.push(
            (x * Math.cos(tilt) - y * Math.sin(tilt)) * GLOBAL_SCALE,
            (x * Math.sin(tilt) + y * Math.cos(tilt)) * GLOBAL_SCALE,
            z * GLOBAL_SCALE,
          );
        }
        for (let i = 0; i < ringCount; i++) {
          let r =
            Math.random() < 0.4
              ? 22 + Math.random() * 8
              : 34 + Math.random() * 12;
          const theta = Math.random() * 2 * Math.PI;
          let x = r * Math.cos(theta),
            y = (Math.random() - 0.5) * 1.5,
            z = r * Math.sin(theta);
          const tiltZ = Math.PI / 6,
            tiltX = Math.PI / 9;
          let x1 = x * Math.cos(tiltZ) - y * Math.sin(tiltZ),
            y1 = x * Math.sin(tiltZ) + y * Math.cos(tiltZ),
            z1 = z;
          tempPos.push(
            x1 * GLOBAL_SCALE,
            (y1 * Math.cos(tiltX) - z1 * Math.sin(tiltX)) * GLOBAL_SCALE,
            (y1 * Math.sin(tiltX) + z1 * Math.cos(tiltX)) * GLOBAL_SCALE,
          );
        }
        return tempPos;
      }

      function calculateHeart() {
        const finalPos = [];
        const desiredPoints = 1500;
        const uniquePoints = [];
        for (let i = 0; i < desiredPoints; i++) {
          const t = (i / desiredPoints) * Math.PI * 2;
          let xBase = 16 * Math.pow(Math.sin(t), 3);
          let yBase =
            13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t) +
            5;
          const thickness = 0.3,
            theta = Math.random() * Math.PI * 2,
            phi = Math.acos(Math.random() * 2 - 1),
            rRandom = Math.random() * thickness;
          uniquePoints.push(
            (xBase + rRandom * Math.sin(phi) * Math.cos(theta)) * GLOBAL_SCALE,
            (yBase + rRandom * Math.sin(phi) * Math.sin(theta)) * GLOBAL_SCALE,
            rRandom * Math.cos(phi) * 1.5 * GLOBAL_SCALE,
          );
        }
        for (let i = 0; i < particleCount; i++) {
          const index = (i % desiredPoints) * 3;
          finalPos.push(
            uniquePoints[index],
            uniquePoints[index + 1],
            uniquePoints[index + 2],
          );
        }
        return finalPos;
      }

      const loader = new FontLoader();
      loader.load(
        "https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json",
        function (font) {
          const textGeo = new TextGeometry("Molly Sayang", {
            font: font,
            size: 18,
            height: 0.5,
            curveSegments: 6,
            bevelEnabled: true,
            bevelThickness: 0.2,
            bevelSize: 0.1,
            bevelSegments: 0,
          });
          textGeo.center();
          const sampler = new MeshSurfaceSampler(
            new THREE.Mesh(textGeo, new THREE.MeshBasicMaterial()),
          ).build();
          const tempPosition = new THREE.Vector3();
          const desiredTextPoints = 2500;
          const uniqueTextPoints = [];
          for (let i = 0; i < desiredTextPoints; i++) {
            sampler.sample(tempPosition);
            uniqueTextPoints.push(
              tempPosition.x * GLOBAL_SCALE,
              tempPosition.y * GLOBAL_SCALE,
              tempPosition.z * GLOBAL_SCALE,
            );
          }
          const finalTextPoints = [];
          for (let i = 0; i < particleCount; i++) {
            const index = (i % desiredTextPoints) * 3;
            finalTextPoints.push(
              uniqueTextPoints[index],
              uniqueTextPoints[index + 1],
              uniqueTextPoints[index + 2],
            );
          }

          shapes.sphere = calculateSphere();
          shapes.cloud = calculateScatteredCloud();
          shapes.saturn = calculateSaturn();
          shapes.heart = calculateHeart();
          shapes.text = finalTextPoints;

          setTargetShape("sphere");
          updateUIState("no-hand");
        },
      );

      // --- LOGIC UTAMA ---
      let currentShape = "sphere";
      let targetColor = new THREE.Color(0x00ffff);
      let targetSize = 0.3;

      // Fungsi Play Sound
      function playSound(keyName) {
        if (sfx[keyName]) {
          sfx[keyName].currentTime = 0;
          // Catch error jika user belum interaksi dengan halaman
          sfx[keyName]
            .play()
            .catch((e) =>
              console.log("Klik layar dulu untuk mengizinkan suara"),
            );
        }
      }

      function setTargetShape(shapeName) {
        if (
          currentShape === shapeName ||
          !shapes[shapeName] ||
          shapes[shapeName].length === 0
        )
          return;

        currentShape = shapeName;

        // --- TRIGGER SUARA (MP3) ---
        if (shapeName === "heart") playSound("heart");
        else if (shapeName === "saturn") playSound("saturn");
        else if (shapeName === "text") playSound("text");
        else if (shapeName === "cloud") playSound("cloud");

        // --- UPDATE VISUAL ---
        const newPos = shapes[shapeName];
        for (let i = 0; i < particleCount; i++) {
          targetPositions[i * 3] = newPos[i * 3];
          targetPositions[i * 3 + 1] = newPos[i * 3 + 1];
          targetPositions[i * 3 + 2] = newPos[i * 3 + 2];
        }

        if (shapeName === "saturn") targetColor.setHex(0xffcc00);
        else if (shapeName === "text") targetColor.setHex(0x00ffff);
        else if (shapeName === "heart") targetColor.setHex(0xff3366);
        else if (shapeName === "cloud") {
          targetColor.setHex(0xaaaaaa);
          targetSize = 2.0;
        } else {
          targetColor.setHex(0x00ffff);
          targetSize = 0.3;
        }

        if (shapeName !== "cloud") targetSize = 0.3;
      }

      // --- UI HELPER ---
      const gestureIconSpan = document.getElementById("gesture-icon");
      const statusTextSpan = document.getElementById("status-text");
      const statusContainer = document.getElementById("status-container");

      function updateUIState(state, icon = "", text = "") {
        if (state === "no-hand") {
          gestureIconSpan.style.display = "none";
          statusTextSpan.innerText = "SHOW HAND TO INTERACT";
          statusContainer.style.backgroundColor = "rgba(20, 20, 20, 0.6)";
        } else if (state === "detected") {
          gestureIconSpan.style.display = "block";
          gestureIconSpan.innerText = icon;
          statusTextSpan.innerText = text;
          statusContainer.style.backgroundColor = "rgba(40, 40, 40, 0.8)";
        }
      }

      // --- MEDIAPIPE TRACKING ---
      function onResults(results) {
        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          const lm = results.multiHandLandmarks[0];
          const handX = lm[9].x;
          const handY = lm[9].y;
          const dist = camera.position.z;
          const vFOV = THREE.MathUtils.degToRad(camera.fov);
          const height = 2 * Math.tan(vFOV / 2) * dist;
          const width = height * camera.aspect;
          const tx = -(handX - 0.5) * width;
          const ty = -(handY - 0.5) * height;
          targetGroupPosition.set(tx, ty, 0);

          const indexUp = lm[8].y < lm[6].y;
          const middleUp = lm[12].y < lm[10].y;
          const ringUp = lm[16].y < lm[14].y;
          const pinkyUp = lm[20].y < lm[18].y;
          const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

          if (pinchDist < 0.05) {
            setTargetShape("heart");
            updateUIState("detected", "🫰", "Love (Ring)");
          } else if (!indexUp && !middleUp && !ringUp && !pinkyUp) {
            setTargetShape("saturn");
            updateUIState("detected", "✊", "Saturn");
          } else if (indexUp && middleUp && !ringUp && !pinkyUp) {
            setTargetShape("text");
            updateUIState("detected", "✌️", "Peace: Molly Sayang");
          } else {
            setTargetShape("cloud");
            updateUIState("detected", "🖐️", "Scattering");
          }
        } else {
          targetGroupPosition.set(0, 0, 0);
          setTargetShape("sphere");
          updateUIState("no-hand");
        }
      }

      const videoElement = document.getElementById("input_video");
      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
      });
      hands.onResults(onResults);

      const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({ image: videoElement });
        },
        width: 640,
        height: 480,
      });
      cameraUtils.start();

      // --- ANIMATION LOOP ---
      function animate() {
        requestAnimationFrame(animate);

        particles.position.lerp(targetGroupPosition, 0.1);
        const positions = particles.geometry.attributes.position.array;
        const speed = 0.08;
        for (let i = 0; i < particleCount; i++) {
          const ix = i * 3;
          positions[ix] += (targetPositions[ix] - positions[ix]) * speed;
          positions[ix + 1] +=
            (targetPositions[ix + 1] - positions[ix + 1]) * speed;
          positions[ix + 2] +=
            (targetPositions[ix + 2] - positions[ix + 2]) * speed;
          if (currentShape === "cloud") {
            positions[ix] += (Math.random() - 0.5) * 0.5;
            positions[ix + 1] += (Math.random() - 0.5) * 0.5;
            positions[ix + 2] += (Math.random() - 0.5) * 0.5;
          }
        }
        particles.geometry.attributes.position.needsUpdate = true;
        particles.material.color.lerp(targetColor, 0.05);
        particles.material.size = THREE.MathUtils.lerp(
          particles.material.size,
          targetSize,
          0.1,
        );

        if (currentShape === "saturn") {
          particles.rotation.y -= 0.01;
          particles.rotation.x = THREE.MathUtils.lerp(
            particles.rotation.x,
            0,
            0.1,
          );
          particles.rotation.z = THREE.MathUtils.lerp(
            particles.rotation.z,
            0,
            0.1,
          );
        } else if (currentShape === "heart") {
          particles.rotation.y += 0.005;
          particles.rotation.x = THREE.MathUtils.lerp(
            particles.rotation.x,
            0,
            0.1,
          );
          particles.rotation.z = THREE.MathUtils.lerp(
            particles.rotation.z,
            0,
            0.1,
          );
        } else if (currentShape === "sphere") {
          particles.rotation.y += 0.003;
          particles.rotation.x = THREE.MathUtils.lerp(
            particles.rotation.x,
            0,
            0.1,
          );
        } else if (currentShape === "cloud") {
          particles.rotation.y += 0.001;
        } else {
          particles.rotation.x = THREE.MathUtils.lerp(
            particles.rotation.x,
            0,
            0.1,
          );
          particles.rotation.y = THREE.MathUtils.lerp(
            particles.rotation.y,
            0,
            0.1,
          );
          particles.rotation.z = THREE.MathUtils.lerp(
            particles.rotation.z,
            0,
            0.1,
          );
        }
        composer.render();
      }

      animate();

      // --- KLIK LISTENER ---
      window.addEventListener("click", () => {
        const instr = document.getElementById("audio-instruction");
        if (instr) instr.style.display = "none";
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
